<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>V - Unity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in-start">

  <div class="header finisher-header" style="width: 100%; height: 800px;"></div>

<header>
  <link href="https://fonts.googleapis.com/css2?family=Bungee:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cal+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

  <img src="../Logo/Logo.png" class="logo" alt="logo">
  <nav>
    <a href="#about">About</a>
    <a href="#Talent">Talent</a>
  </nav>
</header>

<section id="home" class="hero">
    <div class="typing" id="typing"></div>
</section>

<section id="about">
  <h2 class = "subtitle">About</h2>

<div class="tabs">
  <div class="tab active" onclick="showTab(event, 'Story')">Backstory</div>
  <div class="tab" onclick="showTab(event, 'Sosmed')">Social Media</div>
</div>

<div id="content"></div>

</section>

<section id="Talent" class="talent">
  <h2 class = "subtitle">Talent</h2>

  <div class="row top">
    <div class="talent-card blue" data-page="../Talent/Tako/Base.html">
      <img src="../Talent/Tako/Pict/Tako_crop.png" oncontextmenu="return false">
      <div class= "glass-card blue" >
        <p class="sub"><strong>• 冰門丸たこ •</strong></p>
        <h2>Hyoumonmaru Tako</h2>
      </div>
    </div>

    <div class="talent-card red" data-page="../Talent/Seiko/Base.html">
      <img src="../Talent/Seiko/Pict/Seiko_crop.png" oncontextmenu="return false">
      <div class="glass-card red">
        <p class="sub"><strong>• 清湖ハト •</strong></p>
        <h2>Seiko Hato</h2>
      </div>
    </div>

    <div class="talent-card green locked" data-page="../Talent/Reiji/Base.html">
      <img src="../Talent/Reiji/Pict/Reiji_solid_crop.png" oncontextmenu="return false">

       <div class="lock-overlay"><img src = "../Talent/Reiji/Pict/Lock.png"></div>

      <div class="glass-card green">
        <p class="sub"><strong>• 吉郎礼二 •</strong></p>
        <h2>Kichirou Reiji</h2>
      </div>
    </div>
  </div>

  <div class="row bottom">
    <div class="talent-card purple" data-page="../Talent/Sanma/Base.html">
      <img src="../Talent/Sanma/Pict/Sanma_crop.png"  oncontextmenu="return false">
      <div class="glass-card purple">
        <p class="sub"><strong>• サンマ •</strong></p>
        <h2>Agashi Sanma</h2>
      </div>
    </div>

    <div class="talent-card orange" data-page="../Talent/Haku/Base.html">
      <img src="../Talent/Haku/Pict/Haku_Crop.png" oncontextmenu="return false" >
      <div class="glass-card orange">
        <p class="sub"><strong>• 白光イシキ •</strong></p>
        <h2>Hakumi Ishiki</h2>
      </div>
    </div>
  </div>

</section>

<footer>
  <p>© V-Unity 2026</p>
</footer>

<script src="script.js"></script>
<script src="finisher-header.es5.min.js"></script>


</body>

</html>
