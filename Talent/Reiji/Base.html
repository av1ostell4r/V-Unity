<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kichirou Reiji</title>

  <!-- FONT (pindah ke head) -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="./design.css">
</head>
<body>

<!-- HEADER -->
<div class="card-glass" id="cardGlass">
  
  <div class="header">
    <div class="name-bar">
    <img src="../Reiji/Pict/Logo.png" class="logo" oncontextmenu="return false">
    <h1 class="name">
      <span class="symbol">✧･ﾟ</span> Kichirou Reiji
    </h1>
    </div>
    <div class="status">● ACTIVE</div>
    <div class="status">● INDIE</div>
  </div>

  <div class="main">
    <div class="left">
      <div class="image-container" id="zoomContainer">
        <img src="../Reiji/Pict/Reiji.png" id="avatar" oncontextmenu="return false"> 
         <!-- <img src="../Reiji/Pict/Reiji_solid.png" id="avatar" oncontextmenu="return false"> -->
        
        <button id="closeFullscreen" class="fs-close-btn">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="controls">
        <button id="zoomOut">
          <span class="material-symbols-outlined">zoom_out</span>
        </button>

        <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">

        <button id="zoomIn">
          <span class="material-symbols-outlined">zoom_in</span>
        </button>

        <button id="fullscreenBtn">
          <span class="material-symbols-outlined">fullscreen</span>
        </button>
      </div>
    </div> 

    <div class="right">
      <div class="info-grid">
        <div class="box">
          <span>Nicknames</span>
          <p>Reiji / Rei</p>
        </div>

        <div class="box"><span>Language</span><p> ID </p></div>
        <div class="box"><span>Debut Date</span><p></p></div>
        <div class="box"><span>Birthday Date</span><p>07 December</p></div>
        
        <div class="box full">
          <span>Profile</span>
          <p>Traveler</p>
        </div>

        <div class="social">
          <img src="./Pict/X.png" class="icon" data-link="https://www.x.com/KichiroReiji">
          <img src="./Pict/IG.png" class="icon" data-link="https://www.instagram.com/kichiroreiji/">
          <img src="./Pict/YT.png" class="icon" data-link="https://www.youtube.com/@ItsMeReiji">
          <img src="./Pict/FB.png" class="icon" data-link="https://www.facebook.com/Kichirou.Reiji">
        </div>
      </div>
    </div>

  </div>

    <div class="mid-btn">
      <div class="btn active" onclick="showTab(event, 'debut-video')">Debut Video</div>
      <div class="btn" onclick="showTab(event, 'char-sheet')">Charsheet</div>
      <div class="btn" onclick="showTab(event, 'story')">Story</div>
    </div>

    <div id="debut-video" class="tab-content active">
      <div class="box full">
        <a href="https://www.youtube.com/watch?v=ibWV4k0Onvw" target="_blank" class="video-link">
          <div class="thumbnail-container">
            <img src="https://i.ytimg.com/vi/ibWV4k0Onvw/maxresdefault.jpg" class="yt-thumb">
            <div class="play-button">
              <span class="play-icon">▶</span>
              <p> Coming Soon ~ </p>
            </div>
          </div>
        </a>
      </div>
    </div>

    <div id="char-sheet" class="tab-content">
      <div class="box full">
        <div class="charsheet-grid">
          <img src="../Sanma/Pict/Sanma.png" class="sheet-img" oncontextmenu="return false">
        </div>
      </div>
    </div>

    <div id="story" class="tab-content">
      <div class="box full">
        <p> 
        </p>
       </div>
    </div>

</div>

<script src="./script.js"></script>
</body>
</html>
