<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-tako">

<div class="animation-bg" id="animationBg"></div>

<nav class="navbar">
  <div class="navbar__left">
    <div class="navbar__logo-box">
      <img src="../Logo/Logo.png" class="nav-logo-img" oncontextmenu="return false">
    </div>
    <span class="navbar__brand">THE FOUNDER</span>
  </div>
  <div class="navbar__links">
    <a href="../index.html#about">About</a>
    <a href="../index.html#Talent">Talents</a>
    <a href="../index.html#contact">Contact</a>
  </div>
</nav>

<div class="page-layout">

  <aside class="sidebar">
    <div class="av on" data-char="tako" title="Hyoumonmaru Tako">
      <img src="Tako/Pict/Tako_crop.png" oncontextmenu="return false" onerror="this.style.opacity='.3'">
    </div>
    <div class="av" data-char="seiko" title="Seiko Hato">
      <img src="Seiko/Pict/Seiko_crop.png" oncontextmenu="return false" onerror="this.style.opacity='.3'">
    </div>
    <div class="av" data-char="haku" title="Hakumi Ishiki">
      <img src="Haku/Pict/Haku_Crop.png" oncontextmenu="return false" onerror="this.style.opacity='.3'">
    </div>
    <div class="av" data-char="reiji" title="Kichirou Reiji">
      <img src="Reiji/Pict/Reiji_solid_crop.png" oncontextmenu="return false" onerror="this.style.opacity='.3'">
    </div>
    <div class="av" data-char="sanma" title="Agashi Sanma">
      <img src="Sanma/Pict/Sanma_crop.png" oncontextmenu="return false" onerror="this.style.opacity='.3'">
    </div>
    <div class="av av--empty" title="Coming Soon"></div>
  </aside>

  <div class="center-panel">
    <div class="image-container" id="zoomContainer">
      <img src="Tako/Pict/Tako.png" id="avatar" oncontextmenu="return false">
    </div>
    <div class="controls">
      <button id="zoomOut"><span class="material-symbols-outlined">zoom_out</span></button>
      <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">
      <button id="zoomIn"><span class="material-symbols-outlined">zoom_in</span></button>
      <button id="fullscreenBtn"><span class="material-symbols-outlined">fullscreen</span></button>
    </div>
  </div>

  <div class="right-panel">
    <div class="name-block">
      <span class="name-tag" id="char-type">HUMANOID OCTOPUS</span>
      <h1 class="name" id="char-name">Hyoumonmaru Tako</h1>
      <p class="name-alias" id="char-alias">Nickname: Tako / Hyou</p>
      <div class="status-row">
        <span class="status">● ACTIVE</span>
        <span class="status status--indie" id="char-affil">● INDIE</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="info-grid">
      <div class="box"><span>NICKNAMES</span><p id="info-nick">Tako / Hyou</p></div>
      <div class="box"><span>LANGUAGE</span><p id="info-lang">ID / ENG / JP</p></div>
      <div class="box"><span>DEBUT DATE</span><p id="info-debut">10 August 2025</p></div>
      <div class="box"><span>BIRTHDAY</span><p id="info-bday">08 August</p></div>
    </div>

    <div class="divider"></div>

    <div class="social-section">
      <p class="social-label">OFFICIAL SOCIALS</p>
      <div class="social" id="social-icons">
        <!-- ===== X.svg ===== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <path d="M18,14 L46,14 L64,40 L82,14 L94,14 L70,48 L96,86 L68,86 L48,58 L28,86 L16,86 L42,48 Z"
    fill="none" stroke="black" stroke-width="7" stroke-linejoin="round"/>
</svg>

<!-- ===== IG.svg ===== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect x="10" y="10" width="80" height="80" rx="22"
    fill="none" stroke="black" stroke-width="7"/>
  <circle cx="50" cy="50" r="20"
    fill="none" stroke="black" stroke-width="7"/>
  <circle cx="74" cy="26" r="5" fill="black"/>
</svg>

<!-- ===== YT.svg ===== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect x="6" y="22" width="88" height="56" rx="16"
    fill="none" stroke="black" stroke-width="7"/>
  <polygon points="40,34 40,66 72,50" fill="black"/>
</svg>

<!-- ===== TT.svg ===== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <path d="M58,10 C58,10 58,32 76,38 L76,52 C66,52 58,48 58,48 L58,68 C58,78 50,86 40,86 C30,86 22,78 22,68 C22,58 30,50 40,50 L40,64 C35,64 32,66 32,70 C32,74 35,76 39,76 C43,76 45,73 45,69 L45,10 Z"
    fill="none" stroke="black" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
</svg>

<!-- ===== FB.svg ===== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="42"
    fill="none" stroke="black" stroke-width="7"/>
  <path d="M54,14 L54,28 L66,28 L66,44 L54,44 L54,90 L38,90 L38,44 L28,44 L28,28 L38,28 L38,22 C38,14 44,10 54,12 Z"
    fill="none" stroke="black" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
      </div>
    </div>

    <div class="divider"></div>

    <div class="mid-btn">
      <div class="btn active" onclick="showTab(event,'debut-video')">Debut Video</div>
      <div class="btn" onclick="showTab(event,'char-sheet')">Charsheet</div>
      <div class="btn" onclick="showTab(event,'story')">Story</div>
    </div>

    <div class="tab-area">
      <div id="debut-video" class="tab-content active">
        <a id="debut-link" href="#" target="_blank">
          <div class="thumbnail-container">
            <img id="yt-thumb" src="" class="yt-thumb">
            <div class="play-button"><span class="play-icon">▶</span></div>
          </div>
        </a>
      </div>
      <div id="char-sheet" class="tab-content">
        <img id="sheet-img" src="" class="sheet-img" oncontextmenu="return false">
      </div>
      <div id="story" class="tab-content">
        <div class="story-box"><p id="char-story"></p></div>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
